<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmer Market</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <i class="fas fa-leaf"></i> Farmer Market
            </div>
            <a href="index.html" class="btn btn-secondary btn-sm">← Back</a>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-bg">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
        </div>

        <div class="auth-card fade-in">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to your Farmer Market account</p>
            </div>

            <form id="loginForm" class="auth-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <small id="emailError" class="error-message"></small>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••" required autocomplete="current-password">
                    </div>
                    <small id="passwordError" class="error-message"></small>
                </div>

                <!-- Remember Me -->
                <div class="form-check">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-block">
                    <span>Sign In</span>
                </button>

                <!-- General Error -->
                <small id="generalError" class="error-message" style="display: block; text-align: center; margin-top: 10px;"></small>
            </form>

            <!-- Sign Up Link -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up here</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="frontend-config.js?v=20260317-001"></script>
    <script src="js/script.js?v=20260317-001"></script>
    <script>
        // Load theme
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }
        loadTheme();

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = this.querySelector('button[type="submit"]');

            // Clear errors
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('generalError').textContent = '';

            // Validation
            if (!email) {
                document.getElementById('emailError').textContent = 'Email is required';
                return;
            }
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password is required';
                return;
            }

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Signing in...</span>';

            try {
                const result = await loginUser(email, password);
                
                if (result && result.success) {
                    showToast('Login successful!', 'success');
                    // Redirect based on role
                    const user = result.user;
                    if (user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (user.role === 'farmer') {
                        window.location.href = 'farmer.html';
                    } else {
                        window.location.href = 'buyer.html';
                    }
                } else {
                    document.getElementById('generalError').textContent = result?.message || 'Login failed';
                    showToast(result?.message || 'Login failed', 'error');
                }
            } catch (error) {
                console.error('❌ LOGIN ERROR:');
                console.error('   Message:', error.message);
                console.error('   Stack:', error.stack);
                console.error('   Full Error:', error);
                document.getElementById('generalError').textContent = 'An error occurred. Please try again.';
                showToast(`Network error: ${error.message || 'Please check connection'}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span>';
            }
        });
    </script>
</body>
</html>
