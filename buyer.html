<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard - Farmer Market</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <i class="fas fa-leaf"></i> Farmer Market
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="javascript:void(0)" onclick="logout()" class="nav-link">Logout</a></li>
                <li><a href="javascript:void(0)" onclick="toggleCart()" class="nav-link cart-icon">
                    <i class="fas fa-shopping-cart"></i> <span id="cartCount" class="cart-count">0</span>
                </a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </navbar>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Menu</h3>
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <nav class="sidebar-menu">
                <a href="javascript:void(0)" class="menu-item active" onclick="showSection('browse')">
                    <i class="fas fa-store"></i> Browse Products
                </a>
                <a href="javascript:void(0)" class="menu-item" onclick="showSection('orders')">
                    <i class="fas fa-receipt"></i> My Orders
                </a>
                <a href="javascript:void(0)" class="menu-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Browse Products Section -->
            <section id="browse-section" class="dashboard-section">
                <div class="section-header">
                    <h1>Browse Products</h1>
                    <p>Find fresh products from local farmers</p>
                </div>

                <div class="filters-section">
                    <!-- Search Bar -->
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
                    </div>

                    <!-- Category Filter -->
                    <select id="categoryFilter" onchange="filterProducts()" class="category-select">
                        <option value="">All Categories</option>
                        <option value="vegetables">Vegetables</option>
                        <option value="fruits">Fruits</option>
                        <option value="grains">Grains</option>
                        <option value="dairy">Dairy</option>
                        <option value="poultry">Poultry</option>
                        <option value="organic">Organic</option>
                    </select>

                    <!-- Advanced Filters -->
                    <div class="advanced-filters">
                        <div class="filter-group">
                            <label for="priceMin">Min Price ($)</label>
                            <input type="number" id="priceMin" placeholder="0" onchange="filterProducts()" min="0">
                        </div>
                        <div class="filter-group">
                            <label for="priceMax">Max Price ($)</label>
                            <input type="number" id="priceMax" placeholder="1000" onchange="filterProducts()" min="0">
                        </div>
                        <div class="filter-group">
                            <label for="sortBy">Sort By</label>
                            <select id="sortBy" onchange="filterProducts()" class="category-select">
                                <option value="">Default</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Top Rated</option>
                                <option value="newest">Newest First</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div id="productsGrid" class="products-grid">
                    <!-- Products will be rendered here -->
                </div>
            </section>

            <!-- My Orders Section -->
            <section id="orders-section" class="dashboard-section" style="display: none;">
                <div class="section-header">
                    <h1>My Orders</h1>
                </div>

                <div id="ordersList" class="orders-list">
                    <!-- Orders will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Shopping Cart</h2>
                <button class="modal-close" onclick="toggleCart()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div id="cartItems" class="cart-items">
                <!-- Cart items will be rendered here -->
            </div>

            <!-- Coupon Section -->
            <div class="coupon-section">
                <div class="coupon-input-group">
                    <input type="text" id="couponInput" placeholder="Enter coupon code (e.g., FARM10)">
                    <button class="btn btn-secondary" onclick="applyCouponToCart()">Apply</button>
                    <button class="btn btn-outline" onclick="removeCoupon()" id="removeCouponBtn" style="display: none;">Remove</button>
                </div>
                <div id="appliedCoupon" style="display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 8px; color: #2e7d32;">
                    <i class="fas fa-check-circle"></i> <span id="couponMessage"></span>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row" id="discountRow" style="display: none; color: #4caf50;">
                    <span>Discount:</span>
                    <span id="discountAmount">-$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="toggleCart()">Continue Shopping</button>
                <button type="button" class="btn btn-primary" onclick="proceedToPayment()">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="frontend-config.js"></script>
    <script src="js/script.js"></script>
    <script>
        let filteredProducts = [];

        // Initialize buyer dashboard
        async function initBuyerDashboard() {
            redirectIfNotLoggedIn();
            loadTheme();
            loadBuyerDashboard();
        }

        async function loadBuyerDashboard() {
            renderProducts();
            updateCartCount();
        }

        async function renderProducts() {
            const products = await getProducts();
            filteredProducts = [...products];

            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<p class="empty-message">No products available yet</p>';
                return;
            }

            grid.innerHTML = products.map(product => {
                return `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                            <span class="category-badge">${product.category}</span>
                            <button class="wishlist-btn" onclick="toggleWishlist('${product.id}')">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p class="description">${product.description || 'No description'}</p>
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <button class="btn btn-primary btn-sm" onclick="addToCart('${product.id}', '${product.name}', ${product.price})">
                                <i class="fas fa-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
            const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;

            const filtered = filteredProducts.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                    product.description.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || product.category === category;
                const matchesPrice = product.price >= priceMin && product.price <= priceMax;
                return matchesSearch && matchesCategory && matchesPrice;
            });

            const grid = document.getElementById('productsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<p class="empty-message">No products found</p>';
                return;
            }

            grid.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                        <span class="category-badge">${product.category}</span>
                        <button class="wishlist-btn" onclick="toggleWishlist('${product.id}')">
                            <i class="fas fa-heart"></i>
                        </button>
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="description">${product.description || 'No description'}</p>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <button class="btn btn-primary btn-sm" onclick="addToCart('${product.id}', '${product.name}', ${product.price})">
                            <i class="fas fa-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId, productName, price) {
            let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            
            const existingItem = cart.find(item => item.productId === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ productId, productName, price, quantity: 1 });
            }

            sessionStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${productName} added to cart!`, 'success');
        }

        function updateCartCount() {
            const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'flex';
                renderCart();
            }
        }

        function renderCart() {
            const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            const cartItemsContainer = document.getElementById('cartItems');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty-message">Your cart is empty</p>';
                document.getElementById('subtotal').textContent = '$0.00';
                document.getElementById('total').textContent = '$0.00';
                return;
            }

            let subtotal = 0;
            cartItemsContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <h4>${item.productName}</h4>
                            <p>$${item.price.toFixed(2)} each</p>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="decrementQuantity('${item.productId}')">-</button>
                            <input type="number" value="${item.quantity}" readonly>
                            <button onclick="incrementQuantity('${item.productId}')">+</button>
                        </div>
                        <div class="cart-item-total">$${itemTotal.toFixed(2)}</div>
                        <button class="btn-remove" onclick="removeFromCart('${item.productId}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('total').textContent = '$' + subtotal.toFixed(2);
        }

        function incrementQuantity(productId) {
            let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            const item = cart.find(i => i.productId === productId);
            if (item) {
                item.quantity += 1;
                sessionStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                renderCart();
            }
        }

        function decrementQuantity(productId) {
            let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            const item = cart.find(i => i.productId === productId);
            if (item) {
                if (item.quantity > 1) {
                    item.quantity -= 1;
                } else {
                    cart = cart.filter(i => i.productId !== productId);
                }
                sessionStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                renderCart();
            }
        }

        function removeFromCart(productId) {
            let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            cart = cart.filter(i => i.productId !== productId);
            sessionStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }

        async function placeOrder() {
            const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }

            try {
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const order = await createOrder({
                    items: cart,
                    total: total
                });

                sessionStorage.setItem('cart', JSON.stringify([]));
                updateCartCount();
                toggleCart();
                showToast('Order placed successfully!', 'success');
                renderBuyerOrders();
            } catch (error) {
                showToast('Failed to place order: ' + error.message, 'error');
            }
        }

        function proceedToPayment() {
            const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }
            window.location.href = 'payment.html';
        }

        async function toggleWishlist(productId) {
            try {
                await addToWishlist(productId);
                showToast('Added to wishlist', 'success');
            } catch (error) {
                showToast('Failed to update wishlist', 'error');
            }
        }

        async function renderBuyerOrders() {
            const orders = await getOrders({ role: 'buyer' });
            const list = document.getElementById('ordersList');
            
            if (!orders || orders.length === 0) {
                list.innerHTML = '<p class="empty-message">No orders yet</p>';
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <h3>Order #${order.id.substring(0, 8)}</h3>
                        <span class="status-badge status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                    </div>
                    <div class="order-details">
                        <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</p>
                        <p><strong>Total:</strong> $${order.total.toFixed(2)}</p>
                        <p><strong>Items:</strong> ${order.items.length} product(s)</p>
                    </div>
                </div>
            `).join('');
        }

        function showSection(section) {
            document.querySelectorAll('.dashboard-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));

            if (section === 'browse') {
                document.getElementById('browse-section').style.display = 'block';
                document.querySelector('[onclick="showSection(\'browse\')"]').classList.add('active');
            } else if (section === 'orders') {
                document.getElementById('orders-section').style.display = 'block';
                document.querySelector('[onclick="showSection(\'orders\')"]').classList.add('active');
                renderBuyerOrders();
            }

            closeSidebarMobile();
        }

        function closeSidebarMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initBuyerDashboard);
    </script>

        // Initialize
        document.addEventListener('DOMContentLoaded', initBuyerDashboard);
    </script>
</body>
</html>
