<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard - Farmer Market</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <i class="fas fa-leaf"></i> Farmer Market
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="javascript:void(0)" onclick="logout()" class="nav-link">Logout</a></li>
                <li><a href="javascript:void(0)" onclick="toggleCart()" class="nav-link cart-icon">
                    <i class="fas fa-shopping-cart"></i> <span id="cartCount" class="cart-count">0</span>
                </a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </navbar>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Menu</h3>
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <nav class="sidebar-menu">
                <a href="javascript:void(0)" class="menu-item active" onclick="showSection('browse')">
                    <i class="fas fa-store"></i> Browse Products
                </a>
                <a href="javascript:void(0)" class="menu-item" onclick="showSection('orders')">
                    <i class="fas fa-receipt"></i> My Orders
                </a>
                <a href="javascript:void(0)" class="menu-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Browse Products Section -->
            <section id="browse-section" class="dashboard-section">
                <div class="section-header">
                    <h1>Browse Products</h1>
                    <p>Find fresh products from local farmers</p>
                </div>

                <div class="filters-section">
                    <!-- Search Bar -->
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
                    </div>

                    <!-- Category Filter -->
                    <select id="categoryFilter" onchange="filterProducts()" class="category-select">
                        <option value="">All Categories</option>
                        <option value="vegetables">Vegetables</option>
                        <option value="fruits">Fruits</option>
                        <option value="grains">Grains</option>
                        <option value="dairy">Dairy</option>
                        <option value="poultry">Poultry</option>
                        <option value="organic">Organic</option>
                    </select>

                    <!-- Advanced Filters -->
                    <div class="advanced-filters">
                        <div class="filter-group">
                            <label for="priceMin">Min Price ($)</label>
                            <input type="number" id="priceMin" placeholder="0" onchange="filterProducts()" min="0">
                        </div>
                        <div class="filter-group">
                            <label for="priceMax">Max Price ($)</label>
                            <input type="number" id="priceMax" placeholder="1000" onchange="filterProducts()" min="0">
                        </div>
                        <div class="filter-group">
                            <label for="sortBy">Sort By</label>
                            <select id="sortBy" onchange="filterProducts()" class="category-select">
                                <option value="">Default</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Top Rated</option>
                                <option value="newest">Newest First</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div id="productsGrid" class="products-grid">
                    <!-- Products will be rendered here -->
                </div>
            </section>

            <!-- My Orders Section -->
            <section id="orders-section" class="dashboard-section" style="display: none;">
                <div class="section-header">
                    <h1>My Orders</h1>
                </div>

                <div id="ordersList" class="orders-list">
                    <!-- Orders will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Shopping Cart</h2>
                <button class="modal-close" onclick="toggleCart()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div id="cartItems" class="cart-items">
                <!-- Cart items will be rendered here -->
            </div>

            <!-- Coupon Section -->
            <div class="coupon-section">
                <div class="coupon-input-group">
                    <input type="text" id="couponInput" placeholder="Enter coupon code (e.g., FARM10)">
                    <button class="btn btn-secondary" onclick="applyCouponToCart()">Apply</button>
                    <button class="btn btn-outline" onclick="removeCoupon()" id="removeCouponBtn" style="display: none;">Remove</button>
                </div>
                <div id="appliedCoupon" style="display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 8px; color: #2e7d32;">
                    <i class="fas fa-check-circle"></i> <span id="couponMessage"></span>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row" id="discountRow" style="display: none; color: #4caf50;">
                    <span>Discount:</span>
                    <span id="discountAmount">-$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="toggleCart()">Continue Shopping</button>
                <button type="button" class="btn btn-primary" onclick="proceedToPayment()">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/script.js"></script>
    <script>
        let filteredProducts = [];

        // Initialize buyer dashboard
        function initBuyerDashboard() {
            protectRoute('buyer');
            loadBuyerDashboard();
        }

        function loadBuyerDashboard() {
            renderProducts();
            updateCartCount();
        }

        function renderProducts() {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            filteredProducts = [...products];

            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<p class="empty-message">No products available yet</p>';
                return;
            }

            grid.innerHTML = products.map(product => {
                const inWishlist = isInWishlist(product.id, currentUser.id);
                const avgRating = getAverageRating(product.id);
                const starDisplay = avgRating > 0 ? `⭐ ${avgRating.toFixed(1)}` : 'No ratings yet';

                return `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                            <span class="category-badge">${product.category}</span>
                            ${product.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i></span>' : ''}
                            <button class="wishlist-btn ${inWishlist ? 'active' : ''}" onclick="toggleWishlist('${product.id}', '${currentUser.id}')">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p class="rating-text">${starDisplay}</p>
                            <p class="description">${product.description || 'No description'}</p>
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <button class="btn btn-primary btn-sm" onclick="addToCart('${product.id}', '${product.name}', ${product.price})">
                                <i class="fas fa-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
            const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
            const sortBy = document.getElementById('sortBy').value;
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const products = JSON.parse(localStorage.getItem('products')) || [];

            filteredProducts = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                    product.description.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || product.category === category;
                const matchesPrice = product.price >= priceMin && product.price <= priceMax;
                return matchesSearch && matchesCategory && matchesPrice;
            });

            // Apply sorting
            if (sortBy) {
                filteredProducts = sortProducts(filteredProducts, sortBy);
            }

            const grid = document.getElementById('productsGrid');
            if (filteredProducts.length === 0) {
                grid.innerHTML = '<p class="empty-message">No products found</p>';
                return;
            }

            grid.innerHTML = filteredProducts.map(product => {
                const inWishlist = isInWishlist(product.id, currentUser.id);
                const avgRating = getAverageRating(product.id);
                const starDisplay = avgRating > 0 ? `⭐ ${avgRating.toFixed(1)}` : 'No ratings yet';

                return `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                            <span class="category-badge">${product.category}</span>
                            ${product.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i></span>' : ''}
                            <button class="wishlist-btn ${inWishlist ? 'active' : ''}" onclick="toggleWishlist('${product.id}', '${currentUser.id}')">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p class="rating-text">${starDisplay}</p>
                            <p class="description">${product.description || 'No description'}</p>
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <button class="btn btn-primary btn-sm" onclick="addToCart('${product.id}', '${product.name}', ${product.price})">
                                <i class="fas fa-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(productId, productName, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const existingItem = cart.find(item => item.productId === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    productId,
                    productName,
                    price,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${productName} added to cart!`, 'success');
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'flex';
                renderCart();
            }
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const discountInfo = JSON.parse(localStorage.getItem('discountInfo')) || null;

            const cartItemsContainer = document.getElementById('cartItems');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty-message">Your cart is empty</p>';
                document.getElementById('subtotal').textContent = '$0.00';
                document.getElementById('total').textContent = '$0.00';
                document.getElementById('discountRow').style.display = 'none';
                return;
            }

            let subtotal = 0;

            cartItemsContainer.innerHTML = cart.map(item => {
                const product = products.find(p => p.id === item.productId);
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                return `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            <img src="${product ? product.image : 'https://via.placeholder.com/80x80'}" alt="${item.productName}" onerror="this.src='https://via.placeholder.com/80x80'">
                        </div>
                        <div class="cart-item-details">
                            <h4>${item.productName}</h4>
                            <p>$${item.price.toFixed(2)} each</p>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="decrementQuantity('${item.productId}')">-</button>
                            <input type="number" value="${item.quantity}" readonly>
                            <button onclick="incrementQuantity('${item.productId}')">+</button>
                        </div>
                        <div class="cart-item-total">
                            $${itemTotal.toFixed(2)}
                        </div>
                        <button class="btn-remove" onclick="removeFromCart('${item.productId}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            }).join('');

            // Update totals with discount
            const totalAmount = discountInfo ? (subtotal - discountInfo.amount) : subtotal;

            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            
            if (discountInfo && discountInfo.amount > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountAmount').textContent = '-$' + discountInfo.amount.toFixed(2);
                document.getElementById('appliedCoupon').style.display = 'block';
                document.getElementById('couponMessage').textContent = `Coupon "${discountInfo.code}" applied! You save $${discountInfo.amount.toFixed(2)}`;
                document.getElementById('couponInput').value = discountInfo.code;
                document.getElementById('removeCouponBtn').style.display = 'inline-block';
            } else {
                document.getElementById('discountRow').style.display = 'none';
                document.getElementById('appliedCoupon').style.display = 'none';
                document.getElementById('removeCouponBtn').style.display = 'none';
            }

            document.getElementById('total').textContent = '$' + totalAmount.toFixed(2);
        }

        function incrementQuantity(productId) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart.find(i => i.productId === productId);
            if (item) {
                item.quantity += 1;
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                renderCart();
            }
        }

        function decrementQuantity(productId) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart.find(i => i.productId === productId);
            if (item) {
                if (item.quantity > 1) {
                    item.quantity -= 1;
                } else {
                    cart = cart.filter(i => i.productId !== productId);
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                renderCart();
            }
        }

        function removeFromCart(productId) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(i => i.productId !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }

        function placeOrder() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }

            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const order = {
                id: 'ord_' + Date.now(),
                buyerId: currentUser.id,
                buyerName: currentUser.name,
                items: cart.reduce((sum, item) => sum + item.quantity, 0),
                products: cart,
                total,
                status: 'pending',
                createdAt: new Date().toISOString(),
                farmerId: products.find(p => p.id === cart[0].productId)?.farmerId
            };

            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            localStorage.setItem('cart', JSON.stringify([]));

            updateCartCount();
            toggleCart();
            showToast('Order placed successfully! Order ID: ' + order.id.substring(0, 8), 'success');
            renderBuyerOrders();
        }

        function proceedToPayment() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }
            window.location.href = 'payment.html';
        }

        function applyCouponToCart() {
            const couponCode = document.getElementById('couponInput').value.trim();
            if (!couponCode) {
                showToast('Please enter a coupon code', 'error');
                return;
            }

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            applyCoupon(couponCode, subtotal);
            renderCart();
        }

        function toggleWishlist(productId, userId) {
            if (isInWishlist(productId, userId)) {
                removeFromWishlist(productId, userId);
                showToast('Removed from wishlist', 'info');
            } else {
                addToWishlist(productId, userId);
            }
            filterProducts();
        }

        function renderBuyerOrders() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const myOrders = orders.filter(o => o.buyerId === currentUser.id);

            const list = document.getElementById('ordersList');
            if (myOrders.length === 0) {
                list.innerHTML = '<p class="empty-message">No orders yet</p>';
                return;
            }

            list.innerHTML = myOrders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <h3>Order #${order.id.substring(0, 8)}</h3>
                        <span class="status-badge status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                    </div>
                    <div class="order-details">
                        <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</p>
                        <p><strong>Total:</strong> $${order.total.toFixed(2)}</p>
                        <p><strong>Items:</strong> ${order.items} unit(s)</p>
                    </div>
                </div>
            `).join('');
        }

        function showSection(section) {
            document.querySelectorAll('.dashboard-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));

            if (section === 'browse') {
                document.getElementById('browse-section').style.display = 'block';
                document.querySelector('[onclick="showSection(\'browse\')"]').classList.add('active');
            } else if (section === 'orders') {
                document.getElementById('orders-section').style.display = 'block';
                document.querySelector('[onclick="showSection(\'orders\')"]').classList.add('active');
                renderBuyerOrders();
            }

            closeSidebarMobile();
        }

        function closeSidebarMobile() {
            if (window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initBuyerDashboard);
    </script>
</body>
</html>
