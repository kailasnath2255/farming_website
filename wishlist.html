<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Farmer Market</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <i class="fas fa-leaf"></i> Farmer Market
            </div>
            <a href="buyer.html" class="btn btn-secondary btn-sm">← Back to Shopping</a>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="wishlist-container">
        <div class="container">
            <div class="wishlist-header">
                <h1><i class="fas fa-heart"></i> My Wishlist</h1>
                <p id="wishlistCount">0 items</p>
            </div>

            <div id="wishlistContent" class="products-grid">
                <!-- Wishlist items will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="frontend-config.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Core initialization
        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }

        // Theme toggle setup
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            if (document.getElementById('themeToggle')) {
                document.getElementById('themeToggle').addEventListener('click', function() {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                });
            }
        });

        function initWishlistPage() {
            redirectIfNotLoggedIn();
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            if (currentUser) {
                renderWishlist(currentUser);
            }
        }

        function renderWishlist(currentUser) {
            const wishlist = JSON.parse(sessionStorage.getItem('wishlist')) || [];
            const products = JSON.parse(sessionStorage.getItem('products')) || [];

            const userWishlist = wishlist.filter(w => w.userId === currentUser.id);
            const wishlistProducts = userWishlist.map(w => products.find(p => p.id === w.productId)).filter(p => p);

            const container = document.getElementById('wishlistContent');

            if (wishlistProducts.length === 0) {
                container.innerHTML = '<p class="empty-message" style="grid-column: 1/-1;">No items in your wishlist yet</p>';
                document.getElementById('wishlistCount').textContent = '0 items';
                return;
            }

            container.innerHTML = wishlistProducts.map(product => {
                const averageRating = calculateAverageRating(product.reviews || []);
                const reviewCount = (product.reviews || []).length;

                return `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                            <span class="category-badge">${product.category}</span>
                            ${product.verified ? '<span class="verified-badge" title="Verified Farmer"><i class="fas fa-check-circle"></i></span>' : ''}
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p class="description">${product.description || 'No description'}</p>
                            
                            <div class="product-rating">
                                <div class="stars">
                                    ${renderStars(averageRating)}
                                </div>
                                <span class="rating-count">(${reviewCount})</span>
                            </div>

                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <div class="product-actions">
                                <button class="btn btn-primary btn-sm" onclick="addToCart('${product.id}', '${product.name}', ${product.price})">
                                    <i class="fas fa-plus"></i> Add to Cart
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="removeFromWishlist('${product.id}')">
                                    <i class="fas fa-trash"></i> Remove
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('wishlistCount').textContent = wishlistProducts.length + ' item(s)';
        }

        function removeFromWishlist(productId) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            wishlist = wishlist.filter(w => !(w.userId === currentUser.id && w.productId === productId));
            localStorage.setItem('wishlist', JSON.stringify(wishlist));

            showToast('Removed from wishlist', 'success');
            renderWishlist();
        }

        function calculateAverageRating(reviews) {
            if (!reviews || reviews.length === 0) return 0;
            const sum = reviews.reduce((acc, review) => acc + review.rating, 0);
            return (sum / reviews.length).toFixed(1);
        }

        function renderStars(rating) {
            let html = '';
            const fullStars = Math.floor(rating);
            const hasHalf = rating % 1 !== 0;

            for (let i = 0; i < 5; i++) {
                if (i < fullStars) {
                    html += '<i class="fas fa-star"></i>';
                } else if (i === fullStars && hasHalf) {
                    html += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    html += '<i class="far fa-star"></i>';
                }
            }

            return html;
        }

        function addToCart(productId, productName, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            const existingItem = cart.find(item => item.productId === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    productId,
                    productName,
                    price,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            showToast(`${productName} added to cart!`, 'success');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initWishlistPage);
    </script>
</body>
</html>
